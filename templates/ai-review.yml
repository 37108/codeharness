# CodeHarness Configuration
# Place this file as .ai-review.yml in your repository root.
# All fields are optional — defaults are shown below.

# AI provider: "claude" or "copilot" (GitHub Models / OpenAI)
provider: claude

# Model to use (provider-specific)
# Claude: claude-sonnet-4-20250514, claude-opus-4-20250514
# Copilot: gpt-4o, gpt-4o-mini
model: claude-sonnet-4-20250514

# Review output language (en, ja, ko, zh, etc.)
language: en

# Automatically approve PRs when no critical/important issues found
auto_approve: true

# Minimum severity to report (CRITICAL, IMPORTANT, LOW)
severity_threshold: IMPORTANT

# Maximum diff lines before truncation
max_diff_lines: 3000

# Maximum review passes in convergence loop
max_review_passes: 3

# Path to the review guide file (progressive disclosure entry point)
review_guide_path: REVIEW_GUIDE.md

# Label configuration
labels:
  approved: ai-approved
  reviewed: ai-reviewed
  human_required: human-review-required

# File patterns to exclude from review
exclude_patterns:
  - "**/*.lock"
  - "**/package-lock.json"
  - "**/pnpm-lock.yaml"
  - "**/yarn.lock"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/dist/**"
  - "**/build/**"
  - "**/node_modules/**"
  - "**/.git/**"
  - "**/*.generated.*"

# Review skills to activate
# Built-in skills: frontend-react, frontend-nextjs, frontend-css,
#                  backend-node, backend-python, backend-go,
#                  infrastructure, security
#
# Skills are auto-detected from changed file types by default.
# Explicitly list skills here to force-enable them regardless of file types.
# Example:
#   skills:
#     - security
#     - frontend-react
skills: []

# Project-specific invariants for the reviewer
# Example:
#   custom_invariants:
#     - "All database queries must use parameterized statements"
#     - "API endpoints must validate input with Zod schemas"
custom_invariants: []
