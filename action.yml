name: 'CodeHarness AI Review'
description: 'Multi-phase AI code review with harness engineering principles. Supports Claude and GitHub Copilot.'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key (required when provider is "claude")'
    required: false
  github_token:
    description: 'GitHub token with PR read/write permissions. Also used as API key for Copilot provider.'
    required: true
    default: ${{ github.token }}
  provider:
    description: 'AI provider: "claude" or "copilot"'
    required: false
    default: 'claude'
  model:
    description: 'Model to use (e.g., claude-sonnet-4-20250514 or gpt-4o)'
    required: false
    default: 'claude-sonnet-4-20250514'
  language:
    description: 'Review output language (e.g., "en", "ja", "ko", "zh")'
    required: false
    default: 'en'
  auto_approve:
    description: 'Automatically approve PRs with no significant findings'
    required: false
    default: 'true'
  review_guide_path:
    description: 'Path to review guide file (progressive disclosure entry point)'
    required: false
    default: 'REVIEW_GUIDE.md'
  config_path:
    description: 'Path to .ai-review.yml configuration file'
    required: false
    default: '.ai-review.yml'
  max_diff_lines:
    description: 'Maximum diff lines before truncation (default: 3000)'
    required: false
    default: '3000'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run CodeHarness Review
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_LANGUAGE: ${{ inputs.language }}
        INPUT_AUTO_APPROVE: ${{ inputs.auto_approve }}
        INPUT_REVIEW_GUIDE_PATH: ${{ inputs.review_guide_path }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        INPUT_MAX_DIFF_LINES: ${{ inputs.max_diff_lines }}
      run: node ${{ github.action_path }}/dist/index.js
