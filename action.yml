name: 'CodeHarness AI Review'
description: 'Multi-phase AI code review using Claude API with harness engineering principles'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  github_token:
    description: 'GitHub token with PR read/write permissions'
    required: true
    default: ${{ github.token }}
  model:
    description: 'Claude model to use for review'
    required: false
    default: 'claude-sonnet-4-20250514'
  auto_approve:
    description: 'Automatically approve PRs with no significant findings'
    required: false
    default: 'true'
  review_guide_path:
    description: 'Path to review guide file (progressive disclosure entry point)'
    required: false
    default: 'REVIEW_GUIDE.md'
  config_path:
    description: 'Path to .ai-review.yml configuration file'
    required: false
    default: '.ai-review.yml'
  max_diff_lines:
    description: 'Maximum diff lines before truncation (default: 3000)'
    required: false
    default: '3000'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --ignore-scripts

    - name: Build
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npx tsc

    - name: Run CodeHarness Review
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_AUTO_APPROVE: ${{ inputs.auto_approve }}
        INPUT_REVIEW_GUIDE_PATH: ${{ inputs.review_guide_path }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        INPUT_MAX_DIFF_LINES: ${{ inputs.max_diff_lines }}
      run: node ${{ github.action_path }}/dist/index.js
